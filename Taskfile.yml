version: '3'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Type-check and bundle the Screeps bot
    cmds:
      - npm run build

  upload:
    desc: Build and upload dist/main.js to Screeps
    deps:
      - build
    cmds:
      - node scripts/upload-screeps.cjs

  status:
    desc: Print current Screeps bot status from Memory.stats
    cmds:
      - node scripts/status-screeps.cjs

  history:
    desc: Print recent Screeps stats history as JSON
    cmds:
      - node scripts/status-screeps.cjs --json

  push:
    desc: Alias for upload
    cmds:
      - task: upload
